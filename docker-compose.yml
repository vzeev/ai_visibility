x-python-build: &python-build
  context: ${DOCKER_BUILD_CONTEXT}
  dockerfile: ${PYTHON_SERVICE_DOCKERFILE}

x-mounted-repo-env: &mounted-repo-env
  type: bind
  source: ${REPO_ENV_FILE}
  target: ${CONTAINER_ENV_FILE}
  read_only: true

x-docker-database-url: &docker-database-url postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_DOCKER_HOST}:${POSTGRES_DOCKER_PORT}/${POSTGRES_DB}

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_DOCKER_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p ${POSTGRES_DOCKER_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 20

  config-service:
    build: *python-build
    command: ["uvicorn", "apps.config_service.app.main:app", "--host", "${SERVICE_BIND_HOST}", "--port", "${CONFIG_SERVICE_PORT}"]
    environment:
      SERVICE_NAME: ${CONFIG_SERVICE_NAME}
      DATABASE_URL: *docker-database-url
      AI_VISIBILITY_CORS_ORIGINS: ${AI_VISIBILITY_CORS_ORIGINS}
    ports:
      - "${CONFIG_SERVICE_PORT}:${CONFIG_SERVICE_PORT}"
    volumes:
      - *mounted-repo-env
    depends_on:
      postgres:
        condition: service_healthy

  visibility-service:
    build: *python-build
    command: ["uvicorn", "apps.visibility_service.app.main:app", "--host", "${SERVICE_BIND_HOST}", "--port", "${VISIBILITY_SERVICE_PORT}"]
    environment:
      SERVICE_NAME: ${VISIBILITY_SERVICE_NAME}
      DATABASE_URL: *docker-database-url
      AI_VISIBILITY_CORS_ORIGINS: ${AI_VISIBILITY_CORS_ORIGINS}
    ports:
      - "${VISIBILITY_SERVICE_PORT}:${VISIBILITY_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  insights-service:
    build: *python-build
    command: ["uvicorn", "apps.insights_service.app.main:app", "--host", "${SERVICE_BIND_HOST}", "--port", "${INSIGHTS_SERVICE_PORT}"]
    environment:
      SERVICE_NAME: ${INSIGHTS_SERVICE_NAME}
      DATABASE_URL: *docker-database-url
      AI_VISIBILITY_CORS_ORIGINS: ${AI_VISIBILITY_CORS_ORIGINS}
    ports:
      - "${INSIGHTS_SERVICE_PORT}:${INSIGHTS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  visibility-worker:
    build: *python-build
    command: ["sh", "-c", "while true; do python -m apps.worker.app.main; sleep $${WORKER_POLL_INTERVAL_SECONDS}; done"]
    environment:
      SERVICE_NAME: ${VISIBILITY_WORKER_SERVICE_NAME}
      DATABASE_URL: *docker-database-url
      WORKER_MAX_ITEMS: ${WORKER_MAX_ITEMS}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS}
    volumes:
      - *mounted-repo-env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE}
    working_dir: ${WEB_WORKDIR}
    command: ["sh", "-c", "npm ci && npm run dev -- --host ${WEB_BIND_HOST} --port ${WEB_PORT}"]
    environment:
      VITE_CONFIG_SERVICE_URL: ${VITE_CONFIG_SERVICE_URL}
      VITE_VISIBILITY_SERVICE_URL: ${VITE_VISIBILITY_SERVICE_URL}
      VITE_INSIGHTS_SERVICE_URL: ${VITE_INSIGHTS_SERVICE_URL}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    volumes:
      - type: bind
        source: ${REPO_SOURCE_DIR}
        target: ${CONTAINER_APP_DIR}
      - type: volume
        source: web_node_modules
        target: ${WEB_NODE_MODULES_DIR}
    depends_on:
      - config-service
      - visibility-service
      - insights-service

volumes:
  postgres_data:
  web_node_modules:
